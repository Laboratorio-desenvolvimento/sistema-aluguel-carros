micronaut.security.token.jwt.signatures.secret.generator.secret=${JWT_GENERATOR_SIGNATURE_SECRET\:pleaseChangeThisSecretForANewOne}
micronaut.application.name=aluguel-carros
micronaut.security.authentication=bearer
micronaut.security.reject-not-found=false
datasources.default.url=jdbc:mysql://localhost:3306/vrumvrum
datasources.default.driver-class-name=com.mysql.cj.jdbc.Driver
datasources.default.username=${DB_USERNAME\:username}
datasources.default.password=${DB_PASSWORD\:password}
jpa.default.properties.hibernate.hbm2ddl.auto=update
jpa.default.properties.hibernate.show_sql=true
micronaut.server.cors.enabled=true
micronaut.server.cors.configurations.web.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
micronaut.server.cors.configurations.web.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
micronaut.server.cors.configurations.web.allowed-headers=Content-Type,Authorization
micronaut.security.intercept-url-map[0].pattern=/**
micronaut.security.intercept-url-map[0].http-method=OPTIONS
micronaut.security.intercept-url-map[0].access[0]=isAnonymous
micronaut.security.intercept-url-map[1].pattern=/favicon.ico
micronaut.security.intercept-url-map[1].http-method=GET
micronaut.security.intercept-url-map[1].access[0]=isAnonymous
